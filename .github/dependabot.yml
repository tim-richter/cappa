version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      security:
        applies-to: security-updates
        patterns:
          - "*"
      patch-minor:
        applies-to: version-updates
        update-types:
          - minor
          - patch
        patterns:
          - "*"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      security:
        applies-to: security-updates
        patterns:
          - "*"
      patch-minor:
        applies-to: version-updates
        update-types:
          - minor
          - patch
        patterns:
          - "*"
